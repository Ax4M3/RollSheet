        }

        }

                <button type="button" id="btnRemoveImg" class="btn-remove-image" onclick="removeImage()">Supprimer</button>
            </div>
        </div>

        <div class="form-group">
            <label id="lblGameSystem">Système de jeu *</label>
            <div class="system-selector">
                <div class="system-option selected" data-system="dnd" id="systemDnd">Donjons & Dragons</div>
                <div class="system-option" data-system="warhammer" id="systemWarhammer">Warhammer</div>
            </div>
            <input type="hidden" id="system" value="dnd">
        </div>

        <div class="form-group">
            <label id="lblRace" for="race">Race</label>
            <input type="text" id="race" placeholder="Ex: Elfe, Nain, Humain">
        </div>

        <div class="form-group">
            <label id="lblClass" for="className">Classe</label>
            <input type="text" id="className" placeholder="Ex: Mage, Guerrier, Voleur">
        </div>

        <div class="form-group">
            <label id="lblLevel" for="level">Niveau</label>
            <input type="number" id="level" min="1" max="20" value="1">
        </div>

        <div class="form-group">
            <label id="lblLoadJson" for="jsonInput">Charger un personnage (JSON) :</label>
            <input type="file" id="jsonInput" accept=".json" onchange="loadFromJSON(event)">
        </div>

        <div class="form-group">
            <label id="lblAttributes">Attributs</label>
            <div id="attributes-container" class="attributes-grid"></div>
        </div>

        <div class="form-group">
            <label id="lblSkills" for="skills">Compétences (séparées par des virgules)</label>
            <input type="text" id="skills" placeholder="Ex: Magie, Athlétisme, Persuasion">
        </div>

        <div class="form-group">
            <label id="lblInventory" for="inventory">Inventaire (séparé par des virgules)</label>
            <input type="text" id="inventory" placeholder="Ex: Épée, Bouclier, Potion">
        </div>

        <div class="form-group">
            <label id="lblBackstory" for="backstory">Histoire (optionnel)</label>
            <textarea id="backstory" placeholder="Décris l'histoire de ton personnage..."></textarea>
        </div>

        <button id="btnPreview" onclick="showPreview()">Prévisualiser</button>
        <div class="download-buttons">
            <button id="btnDownloadJson" onclick="downloadJSON()">💾 JSON</button>
            <button id="btnDownloadDocx" onclick="downloadDOCX()">📄 DOCX (Word)</button>
            <button id="btnDownloadPdf" onclick="downloadPDF()">📥 PDF</button>
        </div>

        <div id="shareLinkContainer">
            <h3 id="shareTitle">🔗 Partager cette fiche</h3>
            <p id="shareInstructions">Copie ce lien pour partager ta fiche :</p>
            <div id="shareLink"></div>
            <button id="btnCopyLink" onclick="copyShareLink()">📋 Copier le lien</button>
        </div>
    </div>

let currentSystem = "dnd";
let currentLang = localStorage.getItem('lang') || 'fr';
let shareLink = '';

function loadAttributes() {
    const container = document.getElementById('attributes-container');
    container.innerHTML = '';
    const t = translations[currentLang];
    const attrs = currentSystem === 'dnd'
        ? systemAttributes.dnd.map((attr, index) => ({ key: attr, label: t.dndAttrs[index] }))
        : systemAttributes.warhammer.map((attr, index) => ({ key: attr, label: t.warhammerAttrs[index] }));
    attrs.forEach(attr => {
        const group = document.createElement('div');
        group.className = 'attribute-input';
        group.innerHTML = `<label>${attr.label}:</label><input type="number" data-attr="${attr.label}" data-key="${attr.key}" min="1" max="100" value="10">`;
        container.appendChild(group);
    });
}

function previewAndSaveImage(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('avatarBase64').value = e.target.result;
        document.getElementById('avatarPreview').src = e.target.result;
        document.getElementById('avatarPreviewContainer').style.display = 'flex';
        saveToLocalStorage();
    };
    reader.readAsDataURL(file);
}

function removeImage() {
    document.getElementById('avatarInput').value = "";
    document.getElementById('avatarBase64').value = "";
    document.getElementById('avatarPreview').src = "";
    document.getElementById('avatarPreviewContainer').style.display = 'none';
    saveToLocalStorage();
}

function getCharacterData() {
    return {
        name: document.getElementById('name').value,
        system: document.getElementById('system').value,
        race: document.getElementById('race').value,
        class_name: document.getElementById('className').value,
        level: parseInt(document.getElementById('level').value) || 1,
        avatar: document.getElementById('avatarBase64').value,
        attributes: Array.from(document.querySelectorAll('#attributes-container input')).reduce((acc, input) => {
            acc[input.dataset.attr] = parseInt(input.value) || 10;
            return acc;
        }, {}),
        skills: document.getElementById('skills').value.split(',').map(s => s.trim()).filter(s => s),
        inventory: document.getElementById('inventory').value.split(',').map(i => i.trim()).filter(i => i),
        backstory: document.getElementById('backstory').value,
        game_system: document.getElementById('system').value
    };
}

function loadCharacterData(data) {
    document.getElementById('name').value = data.name || '';
    document.getElementById('system').value = data.system || 'dnd';
    document.getElementById('race').value = data.race || '';
    document.getElementById('className').value = data.class_name || '';
    document.getElementById('level').value = data.level || 1;
    document.getElementById('avatarBase64').value = data.avatar || '';
    document.getElementById('skills').value = data.skills ? data.skills.join(', ') : '';
    document.getElementById('inventory').value = data.inventory ? data.inventory.join(', ') : '';
    document.getElementById('backstory').value = data.backstory || '';
    const previewContainer = document.getElementById('avatarPreviewContainer');
    if (data.avatar) {
        document.getElementById('avatarPreview').src = data.avatar;
        previewContainer.style.display = 'flex';
    } else {
        previewContainer.style.display = 'none';
    }
    document.querySelectorAll('.system-option').forEach(opt => {
        opt.classList.remove('selected');
        if (opt.dataset.system === data.system) opt.classList.add('selected');
    });
    currentSystem = data.system;
    loadAttributes();
    setTimeout(() => {
        document.querySelectorAll('#attributes-container input').forEach(input => {
            if (data.attributes && data.attributes[input.dataset.attr] !== undefined) {
                input.value = data.attributes[input.dataset.attr];
            }
        });
    }, 100);
}

function saveToLocalStorage() {
    localStorage.setItem('lastCharacter', JSON.stringify(getCharacterData()));
}

function loadFromLocalStorage() {
    const saved = localStorage.getItem('lastCharacter');
    if (saved) {
        try {
            loadCharacterData(JSON.parse(saved));
        } catch (e) {
            console.error("Erreur de chargement depuis localStorage", e);
        }
    }
}

function generateSheetContent(character) {
    const t = translations[currentLang];
    const name = character.name || t.placeholderName.replace("Ex: ", "");
    const system = character.system;
    const race = character.race || t.sheetNoSpec;
    const className = character.class_name || t.sheetNoSpec;
    const level = character.level || 1;
    const avatar = character.avatar;
    const skills = character.skills;
    const inventory = character.inventory;
    const backstory = character.backstory;
    const attributes = character.attributes;
    let html = `
        <style>
            body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; color: #333; }
            .sheet { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto; }
            .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 20px; }
            .identity-block { display: flex; align-items: center; gap: 20px; }
            .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #ccc; background: #eee; }
            h1 { color: ${system === 'dnd' ? '#8B0000' : '#004d98'}; margin: 0; }
            .attributes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
            .attr-box { border: 1px solid #ccc; padding: 10px; text-align: center; background: #f9f9f9; }
            .attr-name { font-weight: bold; }
            .attr-value { font-size: 1.2em; }
            .section { margin-bottom: 15px; }
            .section h2 { border-bottom: 1px solid #ccc; padding-bottom: 5px; }
            ul { list-style-type: none; padding: 0; }
            li { padding: 5px 0; }
            .back-button {
                display: block;
                text-align: center;
                margin: 20px auto;
                padding: 10px 20px;
                background: #4CAF50;
                color: white;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                text-decoration: none;
                font-size: 16px;
            }
            .back-button:hover { background: #45a049; }
        </style>
        <div class="sheet">
            <div class="header">
                <div class="identity-block">
                    ${avatar ? `<img src="${avatar}" class="avatar-img" alt="Avatar">` : ''}
                    <div><h1>${name}</h1></div>
                </div>
                <div>
                    <strong>${t.sheetRace}</strong> ${race}<br>
                    <strong>${t.sheetClass}</strong> ${className}<br>
                    <strong>${t.sheetLevel}</strong> ${level}
                </div>
            </div>
            <div class="section">
                <h2>${t.sheetAttr}</h2>
                <div class="attributes">
                    ${Object.entries(attributes).map(([attr, value]) => `
                        <div class="attr-box">
                            <div class="attr-name">${attr}</div>
                            <div class="attr-value">${value}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
    `;
    if (skills.length > 0) {
        html += `
            <div class="section">
                <h2>${t.sheetSkills}</h2>
                <ul>${skills.map(skill => `<li>${skill}</li>`).join('')}</ul>
            </div>
        `;
    }
    if (inventory.length > 0) {
        html += `
            <div class="section">
                <h2>${t.sheetEquip}</h2>
                <ul>${inventory.map(item => `<li>${item}</li>`).join('')}</ul>
            </div>
        `;
    }
    if (backstory) {
        html += `
            <div class="section">
                <h2>${t.sheetStory}</h2>
                <p>${backstory}</p>
            </div>
        `;
    }
    html += `<a href="javascript:window.close()" class="back-button">${t.backButton}</a></div>`;
    return html;
}

function showPreview() {
    const previewWindow = window.open();
    previewWindow.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Prévisualisation</title></head><body>${generateSheetContent(getCharacterData())}</body></html>`);
    previewWindow.document.close();
}

function downloadJSON() {
    const character = getCharacterData();
    const t = translations[currentLang];
    saveAs(new Blob([JSON.stringify(character, null, 2)], { type: 'application/json' }), `${character.name || t.placeholderName.replace("Ex: ", "")}.json`);
}

function downloadDOCX() {
    const character = getCharacterData();
    const t = translations[currentLang];
    saveAs(new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${character.name || 'Fiche'}</title></head><body>${generateSheetContent(character)}</body></html>`], { type: 'text/html' }), `${character.name || t.placeholderName.replace("Ex: ", "")}.docx`);
}

function downloadPDF() {
    const character = getCharacterData();
    const t = translations[currentLang];
    const name = character.name || t.placeholderName.replace("Ex: ", "");
    const tempDiv = document.createElement('div');
    tempDiv.style.position = 'fixed';
    tempDiv.style.top = '-9999px';
    tempDiv.innerHTML = generateSheetContent(character);
    document.body.appendChild(tempDiv);
    html2pdf().from(tempDiv).set({
        margin: 10,
        filename: `${name}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, logging: false, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).save().then(() => {
        document.body.removeChild(tempDiv);
    }).catch(() => {
        document.body.removeChild(tempDiv);
    });
}

function generateShareLink() {
    const baseUrl = window.location.origin + window.location.pathname;
    shareLink = `${baseUrl}?data=${btoa(encodeURIComponent(JSON.stringify(getCharacterData())))}`;
    document.getElementById('shareLink').textContent = shareLink;
    document.getElementById('shareLinkContainer').style.display = 'block';
}

function copyShareLink() {
    const t = translations[currentLang];
    navigator.clipboard.writeText(shareLink).then(() => {
        alert(t.copySuccess);
    }).catch(() => {
        const textarea = document.createElement('textarea');
        textarea.value = shareLink;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert(t.copySuccess);
    });
}

function setupEventListeners() {
    document.querySelectorAll('.system-option').forEach(option => {
        option.addEventListener('click', () => {
            document.querySelectorAll('.system-option').forEach(opt => opt.classList.remove('selected'));
            option.classList.add('selected');
            currentSystem = option.dataset.system;
            document.getElementById('system').value = currentSystem;
            loadAttributes();
        });
    });
    document.querySelectorAll('input:not([type="file"]), textarea, select').forEach(input => {
        input.addEventListener('input', saveToLocalStorage);
    });
    document.getElementById('darkModeToggle').addEventListener('click', toggleDarkMode);
    document.getElementById('langSelect').addEventListener('change', () => {
        currentLang = document.getElementById('langSelect').value;
        localStorage.setItem('lang', currentLang);
        applyTranslations();
    });
    document.getElementById('randomBtn').addEventListener('click', generateRandomCharacter);
    const urlParams = new URLSearchParams(window.location.search);
    const data = urlParams.get('data');
    if (data) {
        try {
            loadCharacterData(JSON.parse(decodeURIComponent(atob(data))));
        } catch (e) {
            console.error("Erreur de chargement depuis URL:", e);
        }
    }
}

function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    applyTranslations();
}

if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
}
document.getElementById('langSelect').value = currentLang;
loadAttributes();
applyTranslations();
setupEventListeners();
loadFromLocalStorage();
    </script>
